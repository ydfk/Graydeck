services:
  graydeck:
    build:
      context: .
      dockerfile: Dockerfile
    image: your-dockerhub-user/graydeck:latest
    container_name: graydeck
    restart: unless-stopped
    ports:
      - "8080:18080"
      - "7890:17890/tcp"
      - "7890:17890/udp"
      - "7891:17891/tcp"
      - "7892:17892/tcp"
      - "7893:17893/tcp"
      - "7893:17893/udp"
    environment:
      GRAYDECK_SECRET: "change-this-secret"
    volumes:
      - ./data:/data
      - ./config:/config
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
